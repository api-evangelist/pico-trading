name: Pico
kind: company
description: Pico (pico.net) is a trading-infrastructure and financial market data
  company - not the creator-CRM company of the same name - providing global exchange
  connectivity, colocation and managed infrastructure in 55+ data centers, Redline
  trading software (InRush ticker plant feed handlers and Execution Gateway, acquired
  2021), RedlineFeed normalized market data from 230+ venues, and Corvil network and
  trading analytics (acquired 2019). Market data is delivered to entitled customers
  via multicast feeds and an embedded InRush software API rather than public HTTP
  endpoints, and Corvil exposes analytics via a REST API, SDK, and streaming to Kafka,
  Splunk, and Elastic. Privately held; everything is sales-gated - there is no public
  developer portal, no self-serve signup, and no public API reference, with product
  documentation and the Corvil API docs behind the login-gated customer portal at
  portal.pico.net.
